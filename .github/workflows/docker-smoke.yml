name: Docker Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  docker-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build image
        run: docker build -t kryptos-docker-smoke .

      - name: Verify CLI and artifact write paths in container
        run: >
          docker run --rm kryptos-docker-smoke
          /bin/sh -lc
          'set -e;
          kryptos sections;
          kryptos k4-attempts --label docker-smoke;
          test -n "$(find artifacts/reports -maxdepth 3 -type f -name "attempts_*.json" -print -quit)"'